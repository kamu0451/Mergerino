name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CONAN_VERSION: 2.11.0

jobs:
  build-windows:
    name: "Build Windows x64"
    # Pinned to windows-2022: windows-latest now resolves to
    # windows-2025-vs2026, whose MSVC v15 trips Conan 2.11's
    # `profile detect` ("Invalid setting '15' ... compiler.version").
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          # Full history needed for cmake/GIT.cmake's `git rev-list --count HEAD`
          # which feeds the auto-bumped PATCH into PROJECT_VERSION. A shallow
          # clone bakes "1.5.1" into every CI build regardless of branch state.
          fetch-depth: 0

      - name: TOS-03 guard - anonymous InnerTube read path
        shell: bash
        run: |
          set -euo pipefail

          # The YouTube InnerTube (youtubei) read path must stay anonymous: no
          # OAuth/Authorization token may ever be attached to an InnerTube
          # request. Attaching one would move scraping risk from IP/rate level
          # to account level. Rather than key on the "youtubei" URL literal
          # (which can be extracted to a constant, or sit in a separate helper),
          # this guard keys on the actual read-path attachment mechanism:
          # every InnerTube read builds its headers via youtubeHeaders() and
          # sends them with .headerList(youtubeHeaders()). Legitimate OAuth use
          # is confined to the official googleapis.com/youtube/v3 send/moderate
          # calls, which attach .header("Authorization", ...) inline and never
          # go through youtubeHeaders().
          AUTH_MARKERS='"Authorization"|Bearer[[:space:]]|authToken\('
          guard_failed=0

          # Scan recursively - the provider's headers/hpp declarations live
          # alongside the .cpp, and a non-recursive top-level glob would
          # silently stop covering any file moved into a subdirectory.
          mapfile -t files < <(find src/providers/youtube -type f \( -name '*.cpp' -o -name '*.hpp' \) | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "TOS-03 guard error: no files found under src/providers/youtube - guard scanned nothing."
            exit 1
          fi

          # Sentinel assertions: if the youtubeHeaders() definition or every
          # call site guarding it has disappeared (rename, refactor, provider
          # removal), the checks below would silently pass with nothing left
          # to check. Fail loudly instead of failing open. CRLF is stripped
          # before matching since checkout on windows-2022 can leave \r at
          # end of line, which would break the `$`-anchored awk patterns.
          def_sentinel=0
          callsite_sentinel=0
          for file in "${files[@]}"; do
            content=$(tr -d '\r' < "$file")
            def_hits=$(printf '%s\n' "$content" | grep -cE 'youtubeHeaders\(\)$' || true)
            def_sentinel=$((def_sentinel + def_hits))
            total_hits=$(printf '%s\n' "$content" | grep -oE 'youtubeHeaders\(\)' | wc -l || true)
            callsite_sentinel=$((callsite_sentinel + total_hits - def_hits))
          done

          if [ "$def_sentinel" -eq 0 ] || [ "$callsite_sentinel" -eq 0 ]; then
            echo "guard sentinels not found - the guard no longer covers anything."
            echo "youtubeHeaders() definitions found: $def_sentinel, call sites found: $callsite_sentinel"
            exit 1
          fi

          for file in "${files[@]}"; do
            content=$(tr -d '\r' < "$file")

            # Check 1: the shared read-path header builder youtubeHeaders()
            # must contain no auth marker anywhere in its body.
            headers_body_viol=$(printf '%s\n' "$content" | awk '
              /youtubeHeaders\(\)$/ { inFn = 1 }
              inFn { print NR ": " $0 }
              inFn && /^}/ { inFn = 0 }
            ' | grep -E -- "$AUTH_MARKERS" || true)
            if [ -n "$headers_body_viol" ]; then
              echo "TOS-03 VIOLATION in $file (youtubeHeaders body):"
              echo "An auth marker appears inside youtubeHeaders(), the shared"
              echo "InnerTube read-path header builder. The read path must stay"
              echo "anonymous - see the invariant comment in YouTubeLiveChat.cpp."
              echo "$headers_body_viol"
              guard_failed=1
            fi

            # Check 2: no single top-level function may combine a call to
            # youtubeHeaders() - anywhere in the function, not only via the
            # exact composed literal .headerList(youtubeHeaders()) - with an
            # auth marker. Flags are set regardless of order and reset at each
            # column-0 closing brace, so this is order-independent and does
            # not depend on a single call-site spelling. The auth pattern is a
            # hardcoded awk regex literal (not passed via -v) so backslash-
            # escaping of the paren is unambiguous.
            combined_viol=$(printf '%s\n' "$content" | awk '
              /youtubeHeaders\(\)/ { hasRead = 1 }
              /"Authorization"|Bearer[[:space:]]|authToken\(/ { hasAuth = 1 }
              /^}/ {
                if (hasRead && hasAuth) {
                  print "  function ending at line " NR " mixes a youtubeHeaders() call with an auth marker"
                }
                hasRead = 0; hasAuth = 0
              }
            ')
            if [ -n "$combined_viol" ]; then
              echo "TOS-03 VIOLATION in $file (read request + auth in one function):"
              echo "$combined_viol"
              guard_failed=1
            fi

            # Check 3: no single top-level function may reference an InnerTube
            # endpoint fragment (youtubei, /live_chat/, updated_metadata) and
            # an auth marker at the same time. This closes the gap Check 2
            # alone would miss: a future call site attaching OAuth headers
            # inline against an InnerTube endpoint without ever going through
            # youtubeHeaders().
            inline_auth_viol=$(printf '%s\n' "$content" | awk '
              /youtubei|\/live_chat\/|updated_metadata/ { hasEndpoint = 1 }
              /"Authorization"|Bearer[[:space:]]|authToken\(/ { hasAuth = 1 }
              /^}/ {
                if (hasEndpoint && hasAuth) {
                  print "  function ending at line " NR " mixes an InnerTube endpoint with an auth marker"
                }
                hasEndpoint = 0; hasAuth = 0
              }
            ')
            if [ -n "$inline_auth_viol" ]; then
              echo "TOS-03 VIOLATION in $file (InnerTube endpoint + inline auth in one function):"
              echo "$inline_auth_viol"
              guard_failed=1
            fi
          done

          if [ "$guard_failed" -ne 0 ]; then
            exit 1
          fi
          echo "TOS-03 guard passed: youtubeHeaders() is auth-free, no InnerTube read function attaches credentials, and no InnerTube endpoint is called with inline auth."

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4.3.0
        with:
          cache: true
          cache-key-prefix: windows-qt-6.9.3-v1
          modules: qtimageformats
          version: 6.9.3

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Setup sccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: sccache
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          max-size: 2G
          key: sccache-build-windows-x64-6.9.3
          restore-keys: |
            sccache-build-windows-x64

      - name: Cache conan packages
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-${{ runner.arch }}-conan-user-${{ hashFiles('**/conanfile.py') }}-QT6
          path: ~/.conan2/
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-conan-user-

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install and setup Conan
        shell: bash
        run: |
          pip install conan==${{ env.CONAN_VERSION }}
          conan --version
          conan profile detect -f

      - name: Install dependencies
        shell: bash
        run: |
          mkdir build
          cd build
          conan install .. \
            -s build_type=Release \
            -c tools.cmake.cmaketoolchain:generator="Ninja" \
            -b missing \
            --output-folder=. \
            -o with_openssl3=True

      - name: Build
        shell: pwsh
        run: |
          cd build
          cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="conan_toolchain.cmake" `
            -DUSE_PRECOMPILED_HEADERS=ON `
            -DCHATTERINO_LTO=OFF `
            -DFORCE_JSON_GENERATION=Off `
            -DCHATTERINO_SPELLCHECK=On `
            ..
          ninja

      - name: Package
        if: ${{ github.event_name != 'pull_request' }}
        working-directory: build
        shell: pwsh
        run: |
          $packageDir = "Mergerino"
          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }
          windeployqt bin/mergerino.exe --release --no-compiler-runtime --no-translations --no-opengl-sw --dir $packageDir --force-openssl
          Copy-Item bin/mergerino.exe $packageDir/
          Get-ChildItem bin -Filter '*.dll' | Copy-Item -Destination $packageDir -Force
          ..\.CI\deploy-crt.ps1 $packageDir

          # Bundle the Kick onboarding screenshots staged by generate_resources.cmake
          # at build/bin/kick_onboarding - they live on disk now (not in the qrc), so
          # KickLoginPage would render blanks without this.
          Copy-Item bin/kick_onboarding $packageDir/ -Recurse -Force

          # Bundle the in-app updater so Updates::installUpdates() can spawn it.
          $updaterDir = Join-Path $packageDir "updater.1"
          New-Item -ItemType Directory -Force -Path $updaterDir | Out-Null
          Copy-Item bin/updater.1/MergerinoUpdater.exe $updaterDir/

          if (Test-Path "Mergerino.zip") {
            Remove-Item "Mergerino.zip" -Force
          }
          7z a Mergerino.zip .\$packageDir\*

      - name: Upload artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: Mergerino.zip
          path: build/Mergerino.zip

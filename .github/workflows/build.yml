name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CONAN_VERSION: 2.11.0

jobs:
  build-windows:
    name: "Build Windows x64"
    # Pinned to windows-2022: windows-latest now resolves to
    # windows-2025-vs2026, whose MSVC v15 trips Conan 2.11's
    # `profile detect` ("Invalid setting '15' ... compiler.version").
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          # Full history needed for cmake/GIT.cmake's `git rev-list --count HEAD`
          # which feeds the auto-bumped PATCH into PROJECT_VERSION. A shallow
          # clone bakes "1.5.1" into every CI build regardless of branch state.
          fetch-depth: 0

      - name: TOS-03 guard - anonymous InnerTube read path
        shell: bash
        run: |
          set -euo pipefail

          # The YouTube InnerTube (youtubei) read path must stay anonymous: no
          # OAuth/Authorization token may ever be attached to an InnerTube
          # request. Attaching one would move scraping risk from IP/rate level
          # to account level. Rather than key on the "youtubei" URL literal
          # (which can be extracted to a constant, or sit in a separate helper),
          # this guard keys on the actual read-path attachment mechanism:
          # every InnerTube read builds its headers via youtubeHeaders() and
          # sends them with .headerList(youtubeHeaders()). Legitimate OAuth use
          # is confined to the official googleapis.com/youtube/v3 send/moderate
          # calls, which attach .header("Authorization", ...) inline and never
          # go through youtubeHeaders().
          AUTH_MARKERS='"Authorization"|Bearer[[:space:]]|authToken\('
          guard_failed=0
          for file in src/providers/youtube/*.cpp; do
            # Check 1: the shared read-path header builder youtubeHeaders()
            # must contain no auth marker anywhere in its body.
            headers_body_viol=$(awk '
              /youtubeHeaders\(\)$/ { inFn = 1 }
              inFn { print NR ": " $0 }
              inFn && /^}/ { inFn = 0 }
            ' "$file" | grep -E -- "$AUTH_MARKERS" || true)
            if [ -n "$headers_body_viol" ]; then
              echo "TOS-03 VIOLATION in $file (youtubeHeaders body):"
              echo "An auth marker appears inside youtubeHeaders(), the shared"
              echo "InnerTube read-path header builder. The read path must stay"
              echo "anonymous - see the invariant comment in YouTubeLiveChat.cpp."
              echo "$headers_body_viol"
              guard_failed=1
            fi

            # Check 2: no single top-level function may combine a read request
            # (.headerList(youtubeHeaders())) with an auth marker. Flags are set
            # regardless of order and reset at each column-0 closing brace, so
            # this is order-independent and does not rely on any URL literal.
            # The auth pattern is a hardcoded awk regex literal (not passed via
            # -v) so backslash-escaping of the paren is unambiguous.
            combined_viol=$(awk '
              /headerList\(youtubeHeaders\(\)\)/ { hasRead = 1 }
              /"Authorization"|Bearer[[:space:]]|authToken\(/ { hasAuth = 1 }
              /^}/ {
                if (hasRead && hasAuth) {
                  print "  function ending at line " NR " mixes a youtubeHeaders() read with an auth marker"
                }
                hasRead = 0; hasAuth = 0
              }
            ' "$file")
            if [ -n "$combined_viol" ]; then
              echo "TOS-03 VIOLATION in $file (read request + auth in one function):"
              echo "$combined_viol"
              guard_failed=1
            fi
          done

          if [ "$guard_failed" -ne 0 ]; then
            exit 1
          fi
          echo "TOS-03 guard passed: youtubeHeaders() is auth-free and no InnerTube read function attaches credentials."

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4.3.0
        with:
          cache: true
          cache-key-prefix: windows-qt-6.9.3-v1
          modules: qtimageformats
          version: 6.9.3

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Setup sccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: sccache
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          max-size: 2G
          key: sccache-build-windows-x64-6.9.3
          restore-keys: |
            sccache-build-windows-x64

      - name: Cache conan packages
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-${{ runner.arch }}-conan-user-${{ hashFiles('**/conanfile.py') }}-QT6
          path: ~/.conan2/
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-conan-user-

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install and setup Conan
        shell: bash
        run: |
          pip install conan==${{ env.CONAN_VERSION }}
          conan --version
          conan profile detect -f

      - name: Install dependencies
        shell: bash
        run: |
          mkdir build
          cd build
          conan install .. \
            -s build_type=Release \
            -c tools.cmake.cmaketoolchain:generator="Ninja" \
            -b missing \
            --output-folder=. \
            -o with_openssl3=True

      - name: Build
        shell: pwsh
        run: |
          cd build
          cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="conan_toolchain.cmake" `
            -DUSE_PRECOMPILED_HEADERS=ON `
            -DCHATTERINO_LTO=OFF `
            -DFORCE_JSON_GENERATION=Off `
            -DCHATTERINO_SPELLCHECK=On `
            ..
          ninja

      - name: Package
        if: ${{ github.event_name != 'pull_request' }}
        working-directory: build
        shell: pwsh
        run: |
          $packageDir = "Mergerino"
          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }
          windeployqt bin/mergerino.exe --release --no-compiler-runtime --no-translations --no-opengl-sw --dir $packageDir --force-openssl
          Copy-Item bin/mergerino.exe $packageDir/
          Get-ChildItem bin -Filter '*.dll' | Copy-Item -Destination $packageDir -Force
          ..\.CI\deploy-crt.ps1 $packageDir

          # Bundle the in-app updater so Updates::installUpdates() can spawn it.
          $updaterDir = Join-Path $packageDir "updater.1"
          New-Item -ItemType Directory -Force -Path $updaterDir | Out-Null
          Copy-Item bin/updater.1/MergerinoUpdater.exe $updaterDir/

          if (Test-Path "Mergerino.zip") {
            Remove-Item "Mergerino.zip" -Force
          }
          7z a Mergerino.zip .\$packageDir\*

      - name: Upload artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: Mergerino.zip
          path: build/Mergerino.zip

name: Release

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_id:
        description: >
          Build workflow run ID to release. Leave empty to publish the most
          recent successful main-branch Build run.
        type: string
        required: false

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  publish-release:
    name: Publish rolling release
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve Build run to publish
        id: resolve
        uses: actions/github-script@v8
        env:
          INPUT_RUN_ID: ${{ inputs.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (context.eventName === 'workflow_run') {
              const run = context.payload.workflow_run;
              core.info(`Using workflow_run payload: run ${run.id}, branch ${run.head_branch}, sha ${run.head_sha}`);
              core.setOutput('run_id', run.id);
              core.setOutput('head_sha', run.head_sha);
              core.setOutput('head_branch', run.head_branch);
              return;
            }

            let runId = process.env.INPUT_RUN_ID;
            if (runId) {
              runId = runId.trim();
            }

            if (!runId) {
              // Default to the latest successful Build on the ref this
              // dispatch was triggered from - so dispatching from main
              // picks a main Build, and dispatching from a feature branch
              // picks that branch's Build (whose artifact filename matches
              // that branch's release.yml).
              const branch = process.env.GITHUB_REF_NAME;
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'build.yml',
                branch,
                status: 'success',
                per_page: 1,
              });
              if (data.workflow_runs.length === 0) {
                core.setFailed(`No successful Build runs found on branch '${branch}'.`);
                return;
              }
              runId = String(data.workflow_runs[0].id);
              core.info(`No run_id provided; defaulting to latest successful Build on '${branch}': ${runId}`);
            }

            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: Number(runId),
            });

            if (run.conclusion !== 'success') {
              core.setFailed(`Run ${runId} conclusion is '${run.conclusion}', refusing to publish.`);
              return;
            }

            core.info(`Publishing run ${runId} (branch ${run.head_branch}, sha ${run.head_sha}).`);
            core.setOutput('run_id', runId);
            core.setOutput('head_sha', run.head_sha);
            core.setOutput('head_branch', run.head_branch);

      # Checkout first so actions/checkout's workspace clean doesn't
      # wipe the downloaded artifact. Needed for the git-tag-push step
      # below.
      - name: Checkout for tag push
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: Mergerino.zip
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.resolve.outputs.run_id }}
          path: release-artifact

      # Force-update the latest tag via git, not the REST API. The
      # update-ref endpoint returns 403 on workflow_dispatch invocations
      # (unclear why - workflow_run with identical permissions works),
      # but a plain `git push --force` using GITHUB_TOKEN succeeds.
      - name: Force-update latest tag
        env:
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$HEAD_SHA"
          git push origin latest --force

      # Compute the version string the build embedded (MAJOR.MINOR baked from
      # CMakeLists.txt project(...) plus PATCH = `git rev-list --count HEAD`).
      # Used below as the release name so mergerino's update check can show
      # "1.5.137 -> 1.5.138" instead of opaque commit hashes.
      - name: Compute release version
        id: version
        env:
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          MAJOR_MINOR=$(awk '/^project\(/,/\)/{ if (match($0, /VERSION[[:space:]]+([0-9]+)\.([0-9]+)/, m)) { print m[1]"."m[2]; exit } }' CMakeLists.txt)
          if [ -z "$MAJOR_MINOR" ]; then
            echo "Failed to parse MAJOR.MINOR from CMakeLists.txt project(VERSION ...)"
            exit 1
          fi
          PATCH=$(git rev-list --count "$HEAD_SHA")
          VERSION="$MAJOR_MINOR.$PATCH"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Create or update rolling release
        uses: actions/github-script@v8
        env:
          ASSET_NAME: Mergerino.zip
          ASSET_PATH: release-artifact/Mergerino.zip
          RELEASE_NAME: Mergerino ${{ steps.version.outputs.version }}
          RELEASE_TAG: latest
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const assetName = process.env.ASSET_NAME;
            const assetPath = path.join(process.env.GITHUB_WORKSPACE, process.env.ASSET_PATH);
            const headSha = process.env.HEAD_SHA;
            const releaseName = process.env.RELEASE_NAME;
            const tag = process.env.RELEASE_TAG;
            const body = [
              'Rolling release for the latest successful `main` build.',
              '',
              'This release is replaced automatically on every successful push to `main`.',
            ].join('\n');

            // Tag has already been force-updated via git push in the
            // previous step; no REST call needed here.

            let release;

            try {
              release = (await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              })).data;

              release = (await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                tag_name: tag,
                name: releaseName,
                body,
                draft: false,
                prerelease: false,
              })).data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              release = (await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: headSha,
                name: releaseName,
                body,
                draft: false,
                prerelease: false,
              })).data;
            }

            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: release.id,
              per_page: 100,
            });

            for (const asset of assets) {
              if (asset.name === assetName) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
              }
            }

            const assetData = fs.readFileSync(assetPath);
            const assetSize = fs.statSync(assetPath).size;

            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: release.id,
              name: assetName,
              headers: {
                'content-length': assetSize,
                'content-type': 'application/zip',
              },
              data: assetData,
            });
